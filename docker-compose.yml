version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    command: >
      sh -c "cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 --reload &
             cd frontend && python -m http.server 8080"